<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Builder // MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <span class="logo">[ PC-BUILDER ]</span>
      <button onclick="toggleTheme()">[ ◐ ТЕМА ]</button>
    </nav>
  </header>

  <main>
    <div class="grid">
      <div class="slots">
        <h1>ВЫБОР КОМПЛЕКТУЮЩИХ</h1>
        <div class="presets">
          <div class="muted" style="margin-bottom:8px">БЫСТРЫЙ ВЫБОР:</div>
          <div id="presets-buttons" class="preset-buttons"></div>
        </div>
        <div id="slot-cpu" class="slot" onclick="openPicker('cpu')">[+] ПРОЦЕССОР<br><span class="muted">не выбрано</span></div>
        <div id="slot-motherboard" class="slot" onclick="openPicker('motherboard')">[+] МАТ. ПЛАТА<br><span class="muted">не выбрано</span></div>
        <div id="slot-ram" class="slot" onclick="openPicker('ram')">[+] ОЗУ<br><span class="muted">не выбрано</span></div>
        <div id="slot-gpu" class="slot" onclick="openPicker('gpu')">[+] ВИДЕОКАРТА<br><span class="muted">не выбрано</span></div>
        <div id="slot-storage" class="slot" onclick="openPicker('storage')">[+] НАКОПИТЕЛЬ<br><span class="muted">не выбрано</span></div>
        <div id="slot-psu" class="slot" onclick="openPicker('psu')">[+] БЛОК ПИТАНИЯ<br><span class="muted">не выбрано</span></div>
        <div id="slot-case" class="slot" onclick="openPicker('case')">[+] КОРПУС<br><span class="muted">не выбрано</span></div>
        <div id="slot-cooler" class="slot" onclick="openPicker('cooler')">[+] ОХЛАЖДЕНИЕ<br><span class="muted">не выбрано</span></div>
      </div>

      <aside>
        <h2>СТАТУС</h2>
        <div id="status"></div>
        <div class="total">ИТОГО: <span id="total-price">0 ₽</span></div>
        <button onclick="copyText()">[ СКОПИРОВАТЬ ТЕКСТ ]</button>
        <button onclick="saveBuild()">[ СОХРАНИТЬ СБОРКУ ]</button>
        <button onclick="location.reload()">[ СБРОСИТЬ ]</button>
      </aside>
    </div>

    <section class="history">
      <h2>МОИ СБОРКИ</h2>
      <div id="builds-list" class="builds-list"></div>
    </section>

    <div id="overlay" class="overlay hidden" onclick="closePicker()"></div>
    <div id="picker" class="picker hidden"></div>
  </main>

  <script src="app.js"></script>
  <script>
    function openPicker(category) {
      if (!catalog[category]) {
        alert('Каталог ещё загружается, подождите секунду');
        return;
      }
      const picker = document.getElementById('picker');
      const overlay = document.getElementById('overlay');
      
      picker.innerHTML = `
        <h3>${category.toUpperCase()}</h3>
        <input type="text" class="search-input" id="search-input" placeholder="Поиск..." oninput="filterPicker('${category}', this.value)">
        <div id="picker-items"></div>
        <button onclick="closePicker()">[ ЗАКРЫТЬ ]</button>
      `;
      
      renderPickerItems(category, catalog[category]);
      
      picker.classList.remove('hidden');
      overlay.classList.remove('hidden');
      
      // Фокус на поиск
      setTimeout(() => document.getElementById('search-input').focus(), 50);
    }
    
    function renderPickerItems(category, items) {
      const container = document.getElementById('picker-items');
      if (!container) return;
      
      if (items.length === 0) {
        container.innerHTML = '<div class="muted">Ничего не найдено</div>';
        return;
      }
      
      container.innerHTML = items.map(item => {
        const specs = [];
        if (item.socket) specs.push(item.socket);
        if (item.type) specs.push(item.type);
        if (item.capacity) specs.push(item.capacity + 'GB');
        if (item.tdp) specs.push(item.tdp + 'W');
        if (item.length) specs.push(item.length + 'мм');
        if (item.wattage) specs.push(item.wattage + 'W');
        if (item.height) specs.push(item.height + 'мм');
        
        return `
          <div class="pick-item" onclick="selectItem('${category}','${item.id}');closePicker()">
            <div class="item-name">
              ${item.name}
              ${specs.length ? `<span class="item-specs">${specs.join(' • ')}</span>` : ''}
            </div>
            <div class="item-price">${item.price.toLocaleString('ru-RU')} ₽</div>
          </div>
        `;
      }).join('');
    }
    
    function filterPicker(category, query) {
      if (!catalog[category]) return;
      const q = query.toLowerCase().trim();
      const filtered = q === '' 
        ? catalog[category] 
        : catalog[category].filter(item => item.name.toLowerCase().includes(q));
      renderPickerItems(category, filtered);
    }
    
    function closePicker() {
      document.getElementById('picker').classList.add('hidden');
      document.getElementById('overlay').classList.add('hidden');
    }
    
    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    
    // Восстановление темы
    if (localStorage.getItem('theme') === 'dark' || 
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }
  </script>
</body>
</html>
